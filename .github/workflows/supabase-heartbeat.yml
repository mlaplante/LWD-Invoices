name: Supabase Heartbeat

on:
  schedule:
    # Every 4 days at 08:00 UTC (Supabase pauses after 7 days of inactivity)
    - cron: "0 8 */4 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({ connectionString: process.env.DATABASE_URL });
          client.connect()
            .then(() => client.query('SELECT 1'))
            .then(() => { console.log('Supabase heartbeat OK'); return client.end(); })
            .catch(err => { console.error('Heartbeat failed:', err.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
