name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
        env:
          SKIP_ENV_VALIDATION: "true"
      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run lint
