<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — LWD Invoices</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #fafafa;
        color: #18181b;
      }
      main { text-align: center; padding: 2rem; max-width: 28rem; }
      img { width: 64px; height: 64px; margin-bottom: 1rem; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #71717a; margin: 0 0 1.5rem; line-height: 1.5; }
      button {
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.625rem 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>You&rsquo;re offline</h1>
      <p>LWD Invoices needs a connection to load your data. Check your network and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
